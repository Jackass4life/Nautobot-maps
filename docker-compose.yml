# docker-compose.yml - Nautobot Maps (production / quick-start)
#
# Start:   docker compose up --build -d
# Logs:    docker compose logs -f
# Stop:    docker compose down
#
# NOTE: Do NOT use "docker compose build && docker compose start".
# "start" only restarts previously created containers and will fail with
# "has no container to start" on a fresh checkout.  Always use
# "docker compose up" which both creates and starts containers.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  nautobot-maps:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NAUTOBOT_URL=${NAUTOBOT_URL}
      - NAUTOBOT_TOKEN=${NAUTOBOT_TOKEN}
      - NAUTOBOT_VERIFY_SSL=${NAUTOBOT_VERIFY_SSL:-true}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-change-me}
      - CACHE_TTL=${CACHE_TTL:-300}
      - CACHE_TYPE=${CACHE_TYPE:-RedisCache}
      - CACHE_REDIS_URL=${CACHE_REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
